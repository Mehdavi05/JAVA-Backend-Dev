name: Java Multi-Project Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Debug Directory Structure
      run: ls -R  # List all files to confirm pom.xml locations

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Check Maven Version
      run: mvn -version  # Ensure Maven is installed

    - name: Build all Maven projects
      run: |
        for dir in */ ; do
          if [[ -f "$dir/pom.xml" ]]; then
            echo "Building $dir..."
            cd "$dir"
            mvn -B package || exit 1
            cd ..
          else
            echo "Skipping $dir (no pom.xml found)"
          fi
        done
