spring.application.name=demo
server.port=8086

# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MyEmployees;encrypt=false
spring.datasource.username=SA
spring.datasource.password=MyStrongPass123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate settings (optional but recommended)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.drop-impl=ignore

