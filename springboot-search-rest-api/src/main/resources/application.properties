spring.application.name=springboot-search-rest-api

server.port=8087

# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=search_api;encrypt=false
spring.datasource.username=SA
spring.datasource.password=MyStrongPass123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate settings (optional but recommended)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.drop-impl=ignore

logging.level.org.springframework.security=DEBUG

#secret is blogsrestapi, here we have it's encrypted form, encrypted via SHA256 online Encryption
app.jwt-secret=931028dee7322a9c5fcdb79b3ae36ee4ee3757d238ec3e2473511ab41f1f1768
app-jwt-expiration-milliseconds=604800000

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
